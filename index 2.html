<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الحب - إيوته</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8eaf6, #fce4ec);
            background-size: 400% 400%;
            animation: bgMove 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .floating-heart {
            position: absolute;
            animation: fall linear infinite;
            opacity: 0.15;
            font-size: 30px;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.3; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            box-shadow: 0 25px 60px rgba(156, 39, 176, 0.2);
            padding: 35px 28px;
            max-width: 580px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #c2185b, #7b1fa2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #9c27b0;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .question-card {
            background: linear-gradient(135deg, #fff, #fce4ec);
            border-radius: 25px;
            padding: 25px 20px;
            margin-bottom: 20px;
            border: 2px solid #e1bee7;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
        }
        .question-label {
            color: #6a1b9a;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: #4a148c;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e1bee7;
            transition: 0.3s;
        }
        .dot.active {
            background: #9c27b0;
            transform: scale(1.3);
        }
        .dot.done {
            background: #c2185b;
        }

        .answer-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #e1bee7;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            resize: none;
            height: 100px;
            outline: none;
            transition: 0.3s;
            background: #fff9fb;
            color: #4a148c;
        }
        textarea:focus {
            border-color: #9c27b0;
            box-shadow: 0 0 15px rgba(156, 39, 176, 0.2);
        }
        textarea::placeholder {
            color: #ce93d8;
        }

        .send-btn {
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            border: none;
            color: white;
            padding: 14px 35px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(233, 30, 99, 0.35);
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            letter-spacing: 1px;
        }
        .send-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(156, 39, 176, 0.5);
        }
        .send-btn:active {
            transform: scale(0.95);
        }

        .response-msg {
            margin-top: 15px;
            padding: 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.1rem;
            display: none;
        }
        .response-msg.show {
            display: block;
            animation: popIn 0.5s ease;
        }
        .response-msg.love {
            background: #fce4ec;
            color: #c2185b;
            border: 2px solid #f8bbd0;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="heartsBg"></div>

    <div class="container">
        <h1>💖 إيوته 💖</h1>
        <div class="subtitle">لعبة الحب - جوابك يوصلي برسالة حب</div>

        <div class="progress-dots" id="progressDots"></div>

        <div class="question-card">
            <div class="question-label">✨ سؤال الحب ✨</div>
            <div class="question-text" id="questionText"></div>
            <div class="answer-area">
                <textarea id="answerInput" placeholder="اكتبي جوابك هنا يا إيوته..."></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendAnswer()">💌 أرسلي الجواب</button>
            </div>
        </div>

        <div class="response-msg love" id="responseMsg"></div>
    </div>

    <script>
        // ============ إعدادات تيليجرام ============
        const TOKEN = "8172261707:AAHJbhxmSnJqV7T2s3BV85vajkktNz1Z7UI";
        const CHAT_ID = "6829017835";
        const API = `https://api.telegram.org/bot${TOKEN}`;

        // ============ الأسئلة (بدون عرضها للمستخدم) ============
        const questions = [
            "وش أكثر شيء تحبينه فيني؟ 💘",
            "لو كنتِ توصفين حبك لي، وش بتقولين؟ 🥰",
            "وش أجمل ذكرى بيننا؟ 💞",
            "لو تطلبين مني شيء واحد، وش بتطلبين؟ 🎁",
            "وش الشيء اللي يخليك تغارين عليّ؟ 👀",
            "وش أكثر صفة تحبينها في شخصيتي؟ 🤍",
            "لو أكتب لك قصيدة، وش يكون عنوانها؟ 📝",
            "وش الشيء اللي ودك تقولينه لي وما قلته؟ 💌",
            "كلمة وحدة توصف علاقتنا؟ 💖",
            "وش أجمل هدية قدمتها لي؟ 🎀",
            "لو نروح مكان واحد مع بعض، وين تختارين؟ 🌍",
            "وش الشيء اللي يخليك تضحكين دايم؟ 😂",
            "لو توصفيني لإنسان ما يعرفني، وش بتقولين؟ 🗣️",
            "وش أكثر لحظة اشتقتِ لي فيها؟ ⏳",
            "لو تعطيني اسم دلع جديد، وش بتسميني؟ 🐣",
            "كلمة أخيرة تحبين تقولينها لي؟ 💬"
        ];

        let currentIndex = 0;

        function init() {
            createHearts();
            buildProgressDots();
            showQuestion(0);
        }

        function createHearts() {
            const bg = document.getElementById('heartsBg');
            const heartEmojis = ['💖', '💕', '💗', '💘', '💝', '💓', '🩷', '❤️', '💞'];
            for (let i = 0; i < 20; i++) {
                const span = document.createElement('span');
                span.className = 'floating-heart';
                span.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.animationDuration = (Math.random() * 8 + 8) + 's';
                span.style.animationDelay = Math.random() * 6 + 's';
                span.style.fontSize = (Math.random() * 25 + 20) + 'px';
                bg.appendChild(span);
            }
        }

        function buildProgressDots() {
            const container = document.getElementById('progressDots');
            container.innerHTML = '';
            questions.forEach((_, i) => {
                const dot = document.createElement('span');
                dot.className = 'dot';
                dot.id = 'dot' + i;
                container.appendChild(dot);
            });
        }

        function showQuestion(index) {
            currentIndex = index;
            document.getElementById('questionText').textContent = questions[index];
            document.getElementById('answerInput').value = '';
            hideResponse();
            updateDots();
        }

        function updateDots() {
            questions.forEach((_, i) => {
                const dot = document.getElementById('dot' + i);
                dot.classList.remove('active', 'done');
                if (i === currentIndex) dot.classList.add('active');
                else if (i < currentIndex) dot.classList.add('done');
            });
        }

        function hideResponse() {
            const msg = document.getElementById('responseMsg');
            msg.classList.remove('show');
        }

        function showResponse(text) {
            const msg = document.getElementById('responseMsg');
            msg.textContent = text;
            msg.classList.add('show');
        }

        async function sendAnswer() {
            const answer = document.getElementById('answerInput').value.trim();
            if (!answer) {
                showResponse('⚠️ اكتبي جوابك أولاً يا إيوته!');
                return;
            }

            const question = questions[currentIndex];
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = '⏳ جاري الإرسال...';

            const messageText = `💌 رسالة حب من إيوته 💌\n\n❓ *السؤال:* ${question}\n\n💬 *الجواب:* ${answer}\n\n💖 مع حبي ~ إيوته`;

            try {
                const response = await fetch(`${API}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: messageText,
                        parse_mode: 'HTML'
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    showResponse('💖 تم الإرسال! جوابك وصلني يا إيوته ~ أحبك! 💖');
                    setTimeout(() => {
                        if (currentIndex < questions.length - 1) {
                            showQuestion(currentIndex + 1);
                        } else {
                            document.getElementById('questionText').textContent = 'خلصت الأسئلة يا إيوته! 💘';
                            document.getElementById('answerInput').style.display = 'none';
                            document.getElementById('sendBtn').style.display = 'none';
                            showResponse('🎉 برافو يا إيوته! كل أجوبتك وصلتني! أحبك حب ما يتوصف 💖💖');
                        }
                    }, 2500);
                } else {
                    showResponse('😢 فيه مشكلة بالإرسال، حاولي مرة ثانية يا إيوته');
                }
            } catch (error) {
                showResponse('😢 تعذر الاتصال، تأكدي من النت يا إيوته');
            }

            btn.disabled = false;
            btn.textContent = '💌 أرسلي الجواب';
        }

        init();
    </script>
</body>
</html>
